apply plugin: 'com.android.library'

android {
    namespace 'com.headsetholodeck.permissions'
    compileSdk 36
    buildToolsVersion = '36.0.0'

    defaultConfig {
        minSdk 32
        targetSdk 36
    }

    lint {
        abortOnError false
    }

    sourceSets {
        main {
            manifest.srcFile 'AndroidManifest.xml'
            res.srcDirs = ['res']
            assets.srcDirs = ['assets']
            jniLibs.srcDirs = ['libs']
        }
    }
}
